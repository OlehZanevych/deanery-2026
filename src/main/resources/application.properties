spring.application.name=deanery

# ===============================
# = Database
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/deanery
spring.datasource.username=postgres
spring.datasource.password=postgres47

# ===============================
# = SQL Initialization
# Run schema.sql + data.sql on every startup (drops and recreates schema).
# ===============================

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql

# ===============================
# = JPA / Hibernate
# ===============================

# Do NOT let Hibernate auto-generate DDL — we manage the schema via schema.sql
spring.jpa.hibernate.ddl-auto=validate

# Spring Boot's default naming strategy converts camelCase fields to snake_case columns:
#   firstName      → first_name
#   departmentId   → department_id (for @Column without an explicit name)
# This matches our PostgreSQL column naming conventions exactly.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# @DynamicUpdate (set on each entity) makes Hibernate emit only changed columns.
# Defer SQL until the transaction commits — lets Hibernate batch multiple operations.
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Disable open-session-in-view — forces correct lazy-load handling in service layer.
spring.jpa.open-in-view=false

# ===============================
# = Auth
# ===============================

AUTH_TOKEN_LIFETIME=360
